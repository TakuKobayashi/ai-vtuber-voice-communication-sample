name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Build and Deploy to Cloudflare Workers
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build web
        working-directory: web
        run: pnpm run build

      - name: Set Cloudflare Workers secrets
        working-directory: server
        run: |
          echo "${{ secrets.GROQ_API_KEY }}" | pnpm run wrangler secret put GROQ_API_KEY
          echo "${{ secrets.GEMINI_API_KEY }}" | pnpm run wrangler secret put GEMINI_API_KEY
          echo "${{ secrets.VOICEVOX_API_ROOT_URL }}" | pnpm run wrangler secret put VOICEVOX_API_ROOT_URL
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy to Cloudflare Workers
        working-directory: server
        run: pnpm run deploy:cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
